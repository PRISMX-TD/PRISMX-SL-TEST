<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PRISMX 焦点信号 · 精简版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = { theme: { extend: {
      colors: {
        ink: { 950:'#050307',900:'#0a0710',850:'#0f0a18',800:'#150e22',700:'#1d152e',600:'#2a2042' },
        prism: { 200:'#ddccff',300:'#cbb4ff',400:'#a779ff',500:'#8b46ff',600:'#7a2fff',700:'#6320d6' },
        neon: { violet:'#b388ff',cyan:'#33e1ff',pink:'#ff4ddb',lime:'#9dff5b' },
        up:'#2fe6a0', down:'#ff4d6d',
      },
      fontFamily: { display:['Orbitron','sans-serif'], sans:['Sora','system-ui','sans-serif'], mono:['"JetBrains Mono"','monospace'] },
      keyframes: {
        'glow-pulse': { '0%,100%':{ boxShadow:'0 0 16px rgba(139,70,255,0.25)' }, '50%':{ boxShadow:'0 0 30px rgba(139,70,255,0.5)' } },
        breathe: { '0%,100%':{ opacity:'1' }, '50%':{ opacity:'0.35' } },
        'sheet-up': { '0%':{ transform:'translateY(100%)' }, '100%':{ transform:'translateY(0)' } },
        'toast-in': { '0%':{ transform:'translateY(-120%)', opacity:'0' }, '100%':{ transform:'translateY(0)', opacity:'1' } },
      },
      animation: { 'glow-pulse':'glow-pulse 2.5s ease-in-out infinite', breathe:'breathe 2s ease-in-out infinite', 'sheet-up':'sheet-up .28s cubic-bezier(.2,.8,.2,1)', 'toast-in':'toast-in .4s cubic-bezier(.2,.8,.2,1)' },
    } } }
  </script>
  <style>
    body{ background:#050307; background-image:
      radial-gradient(circle at 15% -10%, rgba(122,47,255,.20), transparent 45%),
      radial-gradient(circle at 90% 0%, rgba(51,225,255,.10), transparent 40%),
      radial-gradient(circle at 80% 100%, rgba(255,77,219,.08), transparent 45%);
      background-attachment:fixed; }
    .glass{ position:relative; border-radius:1rem; border:1px solid rgba(255,255,255,.10); background:rgba(255,255,255,.04); backdrop-filter:blur(20px); box-shadow:0 8px 32px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.08); }
    .neon-text{ background:linear-gradient(120deg,#33e1ff,#8b46ff 45%,#ff4ddb); -webkit-background-clip:text; background-clip:text; color:transparent; }
    .btn-primary{ background:linear-gradient(120deg,#7a2fff,#a779ff 60%,#33e1ff); box-shadow:0 6px 20px rgba(139,70,255,.4), inset 0 1px 0 rgba(255,255,255,.25); color:#fff; }
    .tag{ display:inline-flex; align-items:center; border-radius:.375rem; padding:.1rem .5rem; font-size:.72rem; font-weight:600; }
    .chip{ display:inline-flex; align-items:center; gap:.35rem; border-radius:9999px; border:1px solid rgba(255,255,255,.10); background:rgba(255,255,255,.05); padding:.15rem .6rem; font-size:.7rem; color:#cbd5e1; }
    .no-sb::-webkit-scrollbar{ display:none; } .no-sb{ -ms-overflow-style:none; scrollbar-width:none; }
    .phone{ width:390px; height:844px; border-radius:2.5rem; overflow:hidden; position:relative; box-shadow:0 30px 80px rgba(0,0,0,.6), 0 0 0 10px #14101f, 0 0 0 12px #2a2042; background:#050307; }
    .phone-scroll{ height:100%; overflow-y:auto; } .phone-scroll::-webkit-scrollbar{ width:0; }
    .mono{ font-family:'JetBrains Mono',monospace; }
  </style>
</head>
<body class="text-slate-200 font-sans min-h-screen">
  <div class="max-w-[1100px] mx-auto px-6 py-10">
    <header class="mb-8 text-center">
      <h1 class="font-display text-3xl font-bold mb-2"><span class="neon-text">焦点信号 · 精简版</span></h1>
      <p class="text-slate-400 text-sm max-w-2xl mx-auto">英雄卡用真实盈亏比 + 全市场多空比（全是现成数据）· 下面是「其他活跃信号」卡列表，点击提为英雄 · 零后端改动。</p>
    </header>
    <div class="flex flex-wrap justify-center gap-10 items-start">
      <div class="flex flex-col items-center gap-3">
        <div class="phone"><div id="phone"></div></div>
        <div class="flex flex-wrap justify-center gap-2 max-w-[390px]">
          <button id="btnTrend" class="rounded-full border border-prism-500/40 bg-prism-600/15 px-3 py-1.5 text-xs text-prism-200">📈 切换趋势立场</button>
          <button id="btnCycle" class="rounded-full border border-prism-500/40 bg-prism-600/15 px-3 py-1.5 text-xs text-prism-200">🎲 切换信号状态</button>
          <button id="btnPop" class="rounded-full border border-prism-500/40 bg-prism-600/15 px-3 py-1.5 text-xs text-prism-200">📡 模拟新信号弹出</button>
        </div>
      </div>
      <div id="notes" class="glass w-[300px] p-5 text-sm text-slate-300 leading-relaxed"></div>
    </div>
  </div>
  <!-- PLACEHOLDER_SCRIPT -->
  <script>
  // ====================== 状态机 ======================
  const STATE = {
    WATCH: { key:'WATCH', label:'观望', color:'#94a3b8', glow:'rgba(148,163,184,.22)', advice:'AI 建议等待更清晰的交易机会。' },
    LONG:  { key:'LONG',  label:'做多', color:'#2fe6a0', glow:'rgba(47,230,160,.30)',  advice:'多头动能确认，建议顺势做多。' },
    SHORT: { key:'SHORT', label:'做空', color:'#ff4d6d', glow:'rgba(255,77,109,.30)',  advice:'空头压力增强，建议顺势做空。' },
  };

  // 5 个默认品种。rr=真实盈亏比；ttl=剩余秒数；state=交易信号方向；tf=多周期趋势(UP/DOWN/FLAT)。
  function seedSymbols(){
    return [
      { sym:'XAUUSD', name:'黄金',     bid:'4016.52', ask:'4016.85', state:'WATCH', entry:'4018.20', sl:'4006.40', tp:'4041.60', rr:2.00, ind:'MA5/MA20 金叉, RSI=44.7', ttl:0,   tf:{M5:'UP',M15:'UP',M30:'UP',H1:'DOWN',H4:'DOWN'} },
      { sym:'EURUSD', name:'欧元美元', bid:'1.0842',  ask:'1.0843',  state:'LONG',  entry:'1.0842', sl:'1.0818', tp:'1.0896', rr:1.86, ind:'MA5/MA20 金叉, RSI=58.0', ttl:412, tf:{M5:'UP',M15:'UP',M30:'UP',H1:'UP',H4:'UP'} },
      { sym:'GBPUSD', name:'英镑美元', bid:'1.2710',  ask:'1.2712',  state:'SHORT', entry:'1.2710', sl:'1.2742', tp:'1.2650', rr:1.88, ind:'MA5/MA20 死叉, RSI=66.2', ttl:233, tf:{M5:'DOWN',M15:'DOWN',M30:'DOWN',H1:'DOWN',H4:'FLAT'} },
      { sym:'XAGUSD', name:'白银',     bid:'31.84',   ask:'31.86',   state:'WATCH', entry:'31.90', sl:'31.55', tp:'32.60', rr:2.00, ind:'区间震荡', ttl:0,   tf:{M5:'UP',M15:'DOWN',M30:'FLAT',H1:'UP',H4:'DOWN'} },
      { sym:'BTCUSD', name:'比特币',   bid:'63180',   ask:'63192',   state:'LONG',  entry:'63180', sl:'62400', tp:'64950', rr:2.27, ind:'MACD 底背离', ttl:520, tf:{M5:'UP',M15:'FLAT',M30:'UP',H1:'UP',H4:'FLAT'} },
    ];
  }

  // ====================== 多周期趋势 -> 立场 ======================
  // 展示顺序 & 每周期权重（越大周期权重越高）/ order & per-TF weights
  const TREND_TFS = ['M5','M15','M30','H1','H4'];
  const TF_WEIGHT = { M5:1, M15:1, M30:2, H1:3, H4:3 };
  const STANCE_THRESHOLD = 3;
  const TREND_VIS = { UP:{arrow:'↑',color:'#2fe6a0'}, DOWN:{arrow:'↓',color:'#ff4d6d'}, FLAT:{arrow:'→',color:'#64748b'} };
  // 立场：BULL 看多 / BEAR 看空 / NEUTRAL 观望 / synthesized stance
  const STANCE = {
    BULL:    { key:'BULL',    label:'看多', color:'#2fe6a0', glow:'rgba(47,230,160,.30)', advice:'多周期趋势一致向上，整体偏多。' },
    BEAR:    { key:'BEAR',    label:'看空', color:'#ff4d6d', glow:'rgba(255,77,109,.30)', advice:'多周期趋势一致向下，整体偏空。' },
    NEUTRAL: { key:'NEUTRAL', label:'观望', color:'#94a3b8', glow:'rgba(148,163,184,.22)', advice:'各周期方向分歧，趋势暂不明朗。' },
  };
  // 加权合成：UP +w / DOWN -w / FLAT 0，过阈值才表态 / weighted synthesis
  function trendStance(s){
    let score=0;
    for(const tf of TREND_TFS){
      const d=s.tf?.[tf], w=TF_WEIGHT[tf]||1;
      if(d==='UP') score+=w; else if(d==='DOWN') score-=w;
    }
    return score>=STANCE_THRESHOLD?STANCE.BULL:score<=-STANCE_THRESHOLD?STANCE.BEAR:STANCE.NEUTRAL;
  }
  // 多周期箭头小组件 / multi-TF arrows widget
  function multiTf(s){
    return `<div class="flex items-center gap-1.5">${TREND_TFS.map(tf=>{
      const v=TREND_VIS[s.tf?.[tf]||'FLAT'];
      return `<div class="flex flex-col items-center gap-0.5"><span class="text-[9px] font-medium uppercase leading-none tracking-wider text-slate-500">${tf}</span><span class="font-display text-sm font-bold leading-none" style="color:${v.color}">${v.arrow}</span></div>`;
    }).join('')}</div>`;
  }

  function cycle(s){
    const order=['WATCH','LONG','SHORT'];
    const next=order[(order.indexOf(s.state)+1)%order.length];
    s.state=next; s.ttl = next==='WATCH'?0:(200+Math.floor(Math.random()*400));
  }
  function fmtTtl(sec){ const m=Math.floor(sec/60),s=sec%60; return `${m}:${String(s).padStart(2,'0')}`; }

  // 全市场情绪：按多周期趋势立场统计看多/看空/观望数量 / market-wide stance tally
  function sentiment(symbols){
    let long=0, short=0, watch=0;
    for(const s of symbols){
      const k=trendStance(s).key;
      if(k==='BULL') long++; else if(k==='BEAR') short++; else watch++;
    }
    return { long, short, watch };
  }

  // 解析 indicator 字符串成因子标签（拆逗号），零后端 / parse indicator string into chips
  function factorsOf(s){
    if(s.state==='WATCH') return [];
    return s.ind.split(/[,，]/).map(x=>x.trim()).filter(Boolean);
  }

  // ====================== 通用片段 ======================
  const header = () => `
    <header class="sticky top-0 z-30 border-b border-white/10 bg-ink-950/70 backdrop-blur-xl">
      <div class="flex items-center gap-2.5 px-4 py-3">
        <div class="grid h-[30px] w-[30px] place-items-center rounded-lg" style="background:linear-gradient(135deg,#7a2fff,#33e1ff)"><svg width="16" height="16" viewBox="0 0 24 24" fill="#fff"><path d="M12 2L2 20h20L12 2z"/></svg></div>
        <div class="leading-tight"><div class="font-display text-base font-bold tracking-wider text-slate-100">PRISMX</div><div class="text-[10px] uppercase tracking-[0.2em] text-prism-400">Signal Lab</div></div>
        <div class="ml-auto flex items-center gap-2"><span class="chip"><span class="h-1.5 w-1.5 rounded-full bg-up animate-breathe"></span>实时</span><span class="chip">中</span></div>
      </div>
    </header>`;

  const tabBar = () => `
    <div class="absolute inset-x-0 bottom-0 z-40 border-t border-white/10 bg-ink-950/90 backdrop-blur-xl">
      <div class="flex items-stretch gap-1 px-2 py-1.5 pb-4">
        ${[['信号面板',1],['连接MT5',0],['订单回执',0],['账户',0],['下载桥接',0]].map(([l,a])=>`
          <div class="flex flex-1 flex-col items-center gap-0.5 py-1 text-[10px] ${a?'text-prism-200':'text-slate-500'}">
            <span class="flex h-8 w-full items-center justify-center rounded-lg ${a?'bg-prism-600/20':''}"><svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l5-6 4 4 5-7 4 5"/></svg></span>${l}
          </div>`).join('')}
      </div>
    </div>`;
  // PLACEHOLDER_FRAG

  // —— 英雄卡：多周期趋势立场（看多/看空/观望）+ 五周期箭头 + 全市场情绪 ——
  function heroCard(s, symbols){
    const st=trendStance(s);
    const sen=sentiment(symbols);
    const total=Math.max(1, sen.long+sen.short+sen.watch);
    const longW=Math.round(sen.long/total*100), shortW=Math.round(sen.short/total*100);
    return `<div class="glass overflow-hidden p-4" style="box-shadow:0 8px 32px rgba(0,0,0,.45), 0 0 30px ${st.glow}, inset 0 1px 0 rgba(255,255,255,.08)">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-1.5 text-[11px] uppercase tracking-wider text-slate-400"><svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 2" stroke-linecap="round"/></svg>多周期趋势立场 · ${s.sym}</div>
        <div class="text-[11px] uppercase tracking-wider text-slate-500">多周期趋势</div>
      </div>
      <div class="mt-1 flex items-end justify-between">
        <div class="font-display text-5xl font-extrabold leading-none" style="color:${st.color}">${st.label}</div>
        ${multiTf(s)}
      </div>
      <!-- 全市场情绪（按趋势立场统计）-->
      <div class="mt-4">
        <div class="mb-1 flex items-center justify-between text-[11px]"><span style="color:#2fe6a0">看多 ${sen.long}</span><span class="uppercase tracking-wider text-slate-500">全市场情绪</span><span style="color:#ff4d6d">看空 ${sen.short}</span></div>
        <div class="flex h-2.5 overflow-hidden rounded-full bg-white/10"><div style="width:${longW}%;background:linear-gradient(90deg,#1f9e6e,#2fe6a0)"></div><div class="flex-1"></div><div style="width:${shortW}%;background:linear-gradient(90deg,#ff4d6d,#b3263f)"></div></div>
        <div class="mt-1 text-center text-[10px] text-slate-500">观望 ${sen.watch} · 共 ${total} 个品种</div>
      </div>
      <div class="mt-3 rounded-xl border border-white/8 bg-white/[0.03] px-3 py-2.5 text-sm text-slate-300">${st.advice}</div>
    </div>`;
  }

  // —— 可执行信号卡：与趋势立场解耦，独立成卡 ——
  function signalCard(s){
    const st=STATE[s.state]; const has=s.state!=='WATCH';
    const factors=factorsOf(s);
    return `<div class="glass mt-3 overflow-hidden p-4">
      <div class="flex items-center gap-1.5 text-[11px] uppercase tracking-wider text-slate-400"><svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l5-6 4 4 5-7 4 5"/></svg>可执行信号</div>
      ${has?`
        <div class="mt-2 flex items-end justify-between">
          <div class="flex items-center gap-2"><span class="font-display text-2xl font-bold" style="color:${st.color}">${st.label}</span><span class="tag" style="background:${st.color}1f;color:${st.color}">信号</span></div>
          <div class="text-right"><div class="mono text-xl font-bold" style="color:${st.color}">1:${s.rr.toFixed(2)}</div><div class="text-[10px] uppercase tracking-wider text-slate-500">盈亏比</div></div>
        </div>
        <div class="mt-3 grid grid-cols-3 gap-2 text-center">
          <div class="rounded-lg border border-white/5 bg-white/[0.03] py-2"><div class="text-[10px] uppercase text-slate-500">入场</div><div class="mono text-sm text-slate-100">${s.entry}</div></div>
          <div class="rounded-lg border border-down/15 bg-down/5 py-2"><div class="text-[10px] uppercase text-slate-500">止损</div><div class="mono text-sm" style="color:#ff4d6d">${s.sl}</div></div>
          <div class="rounded-lg border border-up/15 bg-up/5 py-2"><div class="text-[10px] uppercase text-slate-500">止盈</div><div class="mono text-sm" style="color:#2fe6a0">${s.tp}</div></div>
        </div>
        <div class="mt-2 flex flex-wrap gap-1.5">${factors.map(f=>`<span class="tag" style="background:rgba(47,230,160,.12);color:#2fe6a0">✓ ${f}</span>`).join('')}</div>
        <div class="mt-3 flex items-center gap-3">
          <div class="flex-1 rounded-xl border border-amber-400/20 bg-amber-400/5 px-3 py-2"><div class="text-[10px] uppercase text-slate-500">剩余时效</div><div class="mono text-sm text-amber-400">${fmtTtl(s.ttl)}</div></div>
          <button data-act="detail" class="btn-primary flex-1 rounded-xl py-3 text-sm font-semibold">查看详细信号</button>
        </div>`:`
        <div class="mt-2 flex items-center justify-center gap-2 rounded-xl border border-dashed border-white/12 py-4 text-xs text-slate-500"><span class="h-1.5 w-1.5 rounded-full bg-slate-500 animate-breathe"></span>暂无可执行信号 · AI 持续监控中</div>`}
    </div>`;
  }

  // —— 价格条 ——
  function priceBar(s){
    return `<div class="glass flex items-center gap-2 px-3 py-2.5 text-sm">
      <span class="h-2 w-2 rounded-full bg-up animate-breathe"></span><span class="font-semibold text-slate-200">${s.sym}.s</span>
      <span class="ml-auto text-[10px] text-slate-500">B</span><span class="mono font-bold" style="color:#2fe6a0">${s.bid}</span>
      <span class="rounded bg-white/8 px-1.5 py-0.5 text-[10px] text-slate-400">spread</span>
      <span class="text-[10px] text-slate-500">A</span><span class="mono font-bold" style="color:#ff4d6d">${s.ask}</span>
    </div>`;
  }

  // —— 其他活跃信号：紧凑卡，点击提为英雄 ——
  function otherCard(s, idx){
    const st=STATE[s.state];
    return `<button data-act="focus" data-i="${idx}" class="glass flex w-full items-center gap-3 px-3 py-2.5 text-left">
      <span class="grid h-9 w-9 shrink-0 place-items-center rounded-lg" style="background:${st.color}1f"><span class="h-2 w-2 rounded-full" style="background:${st.color}"></span></span>
      <div class="min-w-0 flex-1">
        <div class="flex items-center gap-2"><span class="font-semibold text-slate-100">${s.sym}</span><span class="tag" style="background:${st.color}1f;color:${st.color}">${st.label}</span></div>
        <div class="truncate text-[11px] text-slate-500">${s.ind}</div>
      </div>
      <div class="text-right"><div class="mono text-sm font-bold" style="color:${st.color}">1:${s.rr.toFixed(2)}</div><div class="mono text-[10px] text-amber-400">${fmtTtl(s.ttl)}</div></div>
    </button>`;
  }

  // —— 详情 sheet ——
  function detailSheet(s){
    const st=STATE[s.state];
    if(s.state==='WATCH') return `<div class="px-5 py-8 text-center"><div class="mb-2 text-2xl">🛰️</div><div class="font-semibold text-slate-200">暂无可执行信号</div><div class="mt-1 text-sm text-slate-500">${s.sym} 当前为观望状态，AI 持续监控中。</div></div>`;
    return `<div class="px-5 pb-6 pt-5">
      <div class="mb-4 flex items-start justify-between"><div class="flex items-center gap-2"><span class="font-display text-2xl font-bold text-white">${s.sym}</span><span class="tag" style="background:${st.color}26;color:${st.color}">${st.label}</span></div><div class="text-right"><div class="mono text-2xl font-bold" style="color:${st.color}">1:${s.rr.toFixed(2)}</div><div class="text-[10px] uppercase tracking-wider text-slate-500">盈亏比</div></div></div>
      <div class="grid grid-cols-3 gap-2 text-center">
        <div class="rounded-lg border border-white/5 bg-white/[0.03] py-2.5"><div class="text-[10px] uppercase text-slate-500">入场</div><div class="mono text-sm text-slate-100">${s.entry}</div></div>
        <div class="rounded-lg border border-white/5 bg-white/[0.03] py-2.5"><div class="text-[10px] uppercase text-slate-500">止损</div><div class="mono text-sm" style="color:#ff4d6d">${s.sl}</div></div>
        <div class="rounded-lg border border-white/5 bg-white/[0.03] py-2.5"><div class="text-[10px] uppercase text-slate-500">止盈</div><div class="mono text-sm" style="color:#2fe6a0">${s.tp}</div></div>
      </div>
      <div class="mt-3 rounded-xl border border-white/8 bg-white/[0.03] px-3 py-2.5 text-xs text-slate-400">依据：${s.ind} · 剩余时效 ${fmtTtl(s.ttl)}</div>
      <button class="btn-primary mt-4 w-full rounded-xl py-3 text-sm font-semibold">立即下单</button>
    </div>`;
  }
  // PLACEHOLDER_FRAG2

  // ====================== Phone 控制器 ======================
  class Phone {
    constructor(el){
      this.el=el; this.symbols=seedSymbols(); this.focus=0; this.sheet=false; this.toast=null;
      this.render(); this.el.addEventListener('click',e=>this.onClick(e));
    }
    cur(){ return this.symbols[this.focus]; }
    onClick(e){
      const t=e.target.closest('[data-act]'); if(!t) return;
      const a=t.dataset.act;
      if(a==='prev'){ this.focus=(this.focus-1+this.symbols.length)%this.symbols.length; this.sheet=false; }
      if(a==='next'){ this.focus=(this.focus+1)%this.symbols.length; this.sheet=false; }
      if(a==='dot'){ this.focus=+t.dataset.i; this.sheet=false; }
      if(a==='focus'){ this.focus=+t.dataset.i; this.sheet=false; }
      if(a==='detail'){ this.sheet=true; }
      if(a==='close'){ this.sheet=false; }
      if(a==='goToast'){ this.focus=this.toast; this.toast=null; this.sheet=false; }
      this.render();
    }
    cycleCur(){ cycle(this.cur()); this.render(); }
    // 轮换当前品种的多周期趋势，演示看多/看空/观望切换 / cycle current symbol's trend preset
    cycleTrend(){
      const presets=[
        {M5:'UP',M15:'UP',M30:'UP',H1:'UP',H4:'UP'},        // 强看多
        {M5:'UP',M15:'DOWN',M30:'FLAT',H1:'UP',H4:'DOWN'},  // 分歧观望
        {M5:'DOWN',M15:'DOWN',M30:'DOWN',H1:'DOWN',H4:'FLAT'}, // 强看空
      ];
      const s=this.cur();
      s._tp=((s._tp??-1)+1)%presets.length;
      s.tf=presets[s._tp];
      this.render();
    }
    popNewSignal(){
      const idx=this.symbols.findIndex((s,i)=>i!==this.focus && s.state==='WATCH');
      const pick=idx>=0?idx:(this.focus+1)%this.symbols.length;
      const s=this.symbols[pick]; if(s.state==='WATCH') cycle(s);
      this.toast=pick; this.render();
    }
    // 滑动导航 + 彩色状态圆点
    swipeNav(){
      return `<div class="flex items-center justify-between">
        <button data-act="prev" class="glass grid h-9 w-9 place-items-center text-prism-200">‹</button>
        <div class="flex items-center gap-2"><span class="font-display text-base font-bold text-slate-100">${this.cur().sym}</span><span class="text-xs text-slate-500">${this.cur().name}</span></div>
        <button data-act="next" class="glass grid h-9 w-9 place-items-center text-prism-200">›</button>
      </div>
      <div class="mt-2 flex justify-center gap-1.5">${this.symbols.map((s,i)=>`<button data-act="dot" data-i="${i}" class="h-2 rounded-full transition-all" style="width:${i===this.focus?'20px':'8px'};background:${i===this.focus?trendStance(s).color:trendStance(s).color+'66'}"></button>`).join('')}</div>`;
    }
    // 其他活跃信号（排除当前聚焦，只列有信号的）
    otherList(){
      const others=this.symbols.map((s,i)=>[s,i]).filter(([s,i])=>i!==this.focus && s.state!=='WATCH');
      if(others.length===0) return '';
      return `<div class="mb-2 mt-5 flex items-center gap-2"><h3 class="font-display text-sm font-semibold uppercase tracking-wider text-slate-300">其他活跃信号</h3><span class="chip">${others.length}</span></div>
        <div class="flex flex-col gap-2">${others.map(([s,i])=>otherCard(s,i)).join('')}</div>`;
    }
    toastHtml(){
      if(this.toast==null) return '';
      const s=this.symbols[this.toast]; const st=STATE[s.state];
      return `<button data-act="goToast" class="absolute inset-x-3 top-16 z-50 flex animate-toast-in items-center gap-3 rounded-xl border px-3 py-2.5 text-left backdrop-blur-xl" style="border-color:${st.color}66;background:${st.color}1f">
        <span class="grid h-8 w-8 shrink-0 place-items-center rounded-lg" style="background:${st.color}33"><span class="h-2 w-2 rounded-full" style="background:${st.color}"></span></span>
        <div class="min-w-0 flex-1"><div class="text-sm font-semibold text-slate-100">${s.sym} 触发${st.label}信号</div><div class="truncate text-[11px] text-slate-400">盈亏比 1:${s.rr.toFixed(2)} · 点击查看</div></div>
        <span class="text-prism-200">→</span>
      </button>`;
    }
    body(){
      const s=this.cur();
      return `
        <div class="mb-3"><h2 class="font-display text-xl font-bold text-slate-100">手动交易</h2><p class="text-[11px] text-slate-500">AI 分析，手动执行</p></div>
        <div class="mb-3">${this.swipeNav()}</div>
        <div class="mb-3">${priceBar(s)}</div>
        ${heroCard(s, this.symbols)}
        ${signalCard(s)}
        ${this.otherList()}
      `;
    }
    sheetHtml(){
      if(!this.sheet) return '';
      return `<div data-act="close" class="absolute inset-0 z-50 bg-black/50 backdrop-blur-sm"></div>
      <div class="absolute inset-x-0 bottom-0 z-50 animate-sheet-up rounded-t-3xl border-t border-white/12 bg-ink-850/95 backdrop-blur-2xl">
        <div class="flex justify-center pt-2.5"><span class="h-1 w-10 rounded-full bg-white/20"></span></div>
        <div class="flex items-center justify-between px-5 pt-3"><span class="text-[11px] uppercase tracking-wider text-prism-300">信号详情</span><button data-act="close" class="text-slate-500">✕</button></div>
        ${detailSheet(this.cur())}
      </div>`;
    }
    render(){
      this.el.innerHTML = `<div class="phone-scroll">${header()}<main class="px-4 pb-28 pt-4">${this.body()}</main></div>${tabBar()}${this.toastHtml()}${this.sheetHtml()}`;
    }
  }

  // ====================== 挂载 ======================
  const phone=new Phone(document.getElementById('phone'));
  document.getElementById('btnTrend').addEventListener('click', ()=>phone.cycleTrend());
  document.getElementById('btnCycle').addEventListener('click', ()=>phone.cycleCur());
  document.getElementById('btnPop').addEventListener('click', ()=>phone.popNewSignal());

  document.getElementById('notes').innerHTML = `
    <div class="mb-3 font-display text-sm font-bold uppercase tracking-wider text-slate-200">这版改了什么</div>
    <ul class="space-y-2.5 text-xs text-slate-400 leading-relaxed">
      <li><b class="text-slate-200">大字改成趋势立场</b>：由「交易信号」驱动改为「多周期趋势」驱动，显示看多/看空/观望，来源是右上角五周期箭头的加权合成。</li>
      <li><b class="text-slate-200">加权规则</b>：UP +权重 / DOWN −权重，权重 M5·1 M15·1 M30·2 H1·3 H4·3；合成分 ≥3 看多、≤−3 看空、中间观望。</li>
      <li><b class="text-slate-200">信号分离成独立卡</b>：原本挂在大字上的入场/止损/止盈/盈亏比/时效，收进下方「可执行信号」卡；无信号时该卡显示占位。</li>
      <li><b class="text-slate-200">全市场情绪 + 圆点</b>：改成按趋势立场统计看多/看空/观望个数，圆点颜色也跟随立场。</li>
    </ul>
    <div class="mt-4 rounded-xl border border-white/8 bg-white/[0.03] p-3 text-xs text-slate-400 leading-relaxed">
      <div class="mb-1 font-semibold text-slate-300">怎么玩</div>
      ‹ › 或点圆点切品种 · 📈 切当前品种的趋势立场（看多→观望→看空）· 🎲 切交易信号状态 · 📡 模拟别的品种出信号 · 点「查看详细信号」看下单详情。
    </div>`;
  </script>
</body>
</html>
